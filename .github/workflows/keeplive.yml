name: Changsha Weather Heartbeat

on:
  schedule:
  workflow_dispatch:

jobs:
  update-weather:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 确保拥有写入权限
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 必须拉取全部历史，否则 pull 会失败

      - name: Process Weather and Time
        run: |
          # 1. 随机延迟启动 (0 到 60 分钟)，实现时间不固定，达到 5 小时左右的效果
          DELAY=$((RANDOM % 60))
          echo "随机延迟 $DELAY 分钟启动..."
          sleep $((DELAY * 60))

          # 2. 获取长沙当前时间 (UTC+8)
          CS_TIME=$(date -d "+8 hours" "+%Y-%m-%d %H:%M:%S")

          # 3. 获取长沙天气
          WEATHER=$(curl -s "https://wttr.in/Changsha?format=3&lang=zh-cn")

          # 4. 写入文件
          echo "长沙巡检报告" > changsha_weather.txt
          echo "更新时间：$CS_TIME" >> changsha_weather.txt
          echo "实时天气：$WEATHER" >> changsha_weather.txt
          echo "状态：工作流自动更新成功" >> changsha_weather.txt

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add changsha_weather.txt
          
          if git diff --staged --quiet; then
            echo "没有变化，跳过"
          else
            git commit -m "🛡️ 自动更新长沙天气报告: $(date -d '+8 hours' '+%Y-%m-%d %H:%M')"
            
            # 关键修复：先拉取远程变动并合并，解决 rejected 错误
            git pull --rebase origin main
            
            git push origin main
          fi
